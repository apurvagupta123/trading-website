<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Platform - Screener.in Style</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="src/styles/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">📈 Trading Platform</div>
            <div class="nav-search">
                <input type="text" id="search-input" class="search-input" placeholder="Search company (e.g., AAPL, GOOGL, MSFT)">
            </div>
            <div class="nav-tools">
                <button id="sip-calc-btn" class="nav-btn">SIP Calculator</button>
                <button id="goal-calc-btn" class="nav-btn">Goal Calculator</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <!-- Company Header -->
        <div class="company-header">
            <div class="header-top">
                <div>
                    <h1>Loading...</h1>
                    <p class="symbol-exchange">Please wait</p>
                </div>
                <div class="price-info">
                    <div class="current-price">—</div>
                    <div class="price-change">Loading...</div>
                </div>
            </div>
            <div class="header-meta">
                <div class="meta-item">
                    <span class="meta-label">Sector</span>
                    <span class="meta-value">—</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Industry</span>
                    <span class="meta-value">—</span>
                </div>
            </div>
        </div>

        <!-- Quick Stats -->
        <div class="quick-stats">
            <div class="stat-item">
                <div class="stat-label">Market Cap</div>
                <div class="stat-value">—</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">P/E Ratio</div>
                <div class="stat-value">—</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Dividend Yield</div>
                <div class="stat-value">—</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">52W High</div>
                <div class="stat-value">—</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">52W Low</div>
                <div class="stat-value">—</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Volume</div>
                <div class="stat-value">—</div>
            </div>
        </div>

        <!-- Detail Tabs -->
        <div class="detail-tabs">
            <button class="tab-btn active" data-tab="overview">Overview</button>
            <button class="tab-btn" data-tab="financials">Financials</button>
            <button class="tab-btn" data-tab="valuation">Valuation</button>
            <button class="tab-btn" data-tab="technicals">Technicals</button>
        </div>

        <!-- Detail Content (will be populated by JavaScript) -->
        <div class="detail-content">
            <div class="tab-content">
                <p>Loading company details...</p>
            </div>
        </div>
    </div>

    <script src="src/app.js"></script>
</body>
</html>
