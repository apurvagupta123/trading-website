<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard</title>
    <link rel="stylesheet" href="src/styles/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1>📈 Trading Dashboard</h1>
            <input type="text" id="searchInput" placeholder="Search stock...">
        </div>
    </nav>

    <main class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="watchlist">Watchlist</button>
            <button class="tab-btn" data-tab="charts">Charts</button>
            <button class="tab-btn" data-tab="ipo">IPO Calendar</button>
        </div>

        <div id="watchlist" class="tab-content active">
            <div id="stocksGrid" class="stocks-grid"></div>
        </div>

        <div id="charts" class="tab-content">
            <div class="charts-grid" id="chartsGrid"></div>
        </div>

        <div id="ipo" class="tab-content">
            <div id="ipoList" class="ipo-list"></div>
        </div>
    </main>

    <script src="src/app.js"></script>
</body>
</html>
